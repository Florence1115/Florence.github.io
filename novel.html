        <div id="novel-body" class="novel-wrapper horizontal-mode">
            
            <p>春の嵐が吹き抜けた翌朝、庭のしだれ桜は、まるで意志を持っているかのように激しく揺れていた。</p>
            <p>私は縁側に腰を下ろし、静かに湯呑みを傾ける。立ち上る湯気の向こうで、ひらりと一枚の花びらが畳の上に落ちた。</p>
            <br>
            <p>「今年も、この季節が来たか……」</p>
            <p>呟いた声は、風の音にかき消される。桜の木の下に埋められた、あの古びた小箱のことを思い出さない日はなかった。</p>
            <br>
            <p>そのとき、微かに庭の木戸が軋む音が聞こえた。</p>
